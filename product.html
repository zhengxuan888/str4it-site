<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product | Strait Pristine</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="products.js"></script>
<script src="cart.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--color-bg:#ffffff;--color-text:#1a1a1a;--color-text-light:#666;--color-accent:#8b6914;--color-sale:#c41230;--color-border:#e5e5e5;--color-bg-warm:#f8f5f0;--font-serif:'Cormorant Garamond',Georgia,serif;--font-sans:'Jost','Helvetica Neue',Arial,sans-serif;--max-width:1440px}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--font-sans);color:var(--color-text);background:var(--color-bg);line-height:1.6;font-weight:300;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}img{max-width:100%;height:auto;display:block}button{cursor:pointer;border:none;background:none;font-family:inherit}
.container{max-width:var(--max-width);margin:0 auto;padding:0 2rem}
.announcement-bar{background:var(--color-text);color:#fff;text-align:center;padding:10px 20px;font-size:13px;letter-spacing:1.5px;text-transform:uppercase}
.announcement-bar a{color:#fff;text-decoration:underline}
.header{position:sticky;top:0;z-index:1000;background:#fff;border-bottom:1px solid var(--color-border)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;max-width:var(--max-width);margin:0 auto}
.logo{font-family:var(--font-serif);font-size:28px;font-weight:400;letter-spacing:3px;text-transform:uppercase}
.logo span{font-weight:600}
.nav-main{display:flex;gap:32px;align-items:center}
.nav-main a{font-size:13px;letter-spacing:1.2px;text-transform:uppercase;position:relative;padding:4px 0}
.nav-main a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--color-text);transition:width .3s}
.nav-main a:hover::after{width:100%}
.nav-main a.sale-link{color:var(--color-sale);font-weight:500}
.nav-icons{display:flex;gap:20px;align-items:center}
.nav-icons button{font-size:18px;position:relative}
.cart-count{position:absolute;top:-8px;right:-10px;background:var(--color-text);color:#fff;font-size:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.breadcrumb{padding:16px 40px;font-size:12px;color:var(--color-text-light)}
.breadcrumb a{color:var(--color-text-light);transition:color .3s}
.breadcrumb a:hover{color:var(--color-text)}
.product-detail{display:grid;grid-template-columns:1fr 1fr;gap:60px;padding:20px 40px 80px}
.product-gallery{position:sticky;top:100px}
.gallery-main{aspect-ratio:3/4;background:#f5f5f5;overflow:hidden;margin-bottom:12px}
.gallery-main img{width:100%;height:100%;object-fit:cover;transition:opacity .5s}
.gallery-thumbs{display:flex;gap:8px}
.gallery-thumbs img{width:80px;height:100px;object-fit:cover;cursor:pointer;opacity:.6;transition:opacity .3s;border:2px solid transparent}
.gallery-thumbs img:hover,.gallery-thumbs img.active{opacity:1;border-color:var(--color-text)}
.product-info{padding-top:20px}
.product-info h1{font-family:var(--font-serif);font-size:28px;font-weight:400;letter-spacing:1px;margin-bottom:16px;line-height:1.4}
.product-price-main{font-size:20px;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.product-price-main .current{color:var(--color-sale)}
.product-price-main .original{text-decoration:line-through;color:#999;font-weight:300}
.product-price-main .discount{color:var(--color-sale);font-size:14px;font-weight:400}
.product-desc{font-size:14px;color:var(--color-text-light);line-height:1.8;margin:20px 0;padding-bottom:20px;border-bottom:1px solid var(--color-border)}
.size-label{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;font-weight:500}
.size-options{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.size-options button{padding:10px 20px;border:1px solid var(--color-border);font-size:13px;letter-spacing:.5px;transition:all .3s;min-width:50px}
.size-options button:hover{border-color:var(--color-text)}
.size-options button.selected{background:var(--color-text);color:#fff;border-color:var(--color-text)}
.add-to-cart-btn{width:100%;padding:18px;background:var(--color-text);color:#fff;font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;transition:opacity .3s}
.add-to-cart-btn:hover{opacity:.85}
.buy-now-btn{width:100%;padding:18px;border:1px solid var(--color-text);font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;transition:all .3s}
.buy-now-btn:hover{background:var(--color-text);color:#fff}
.product-meta{font-size:12px;color:var(--color-text-light);line-height:2}
.product-meta span{display:block}
.accordion{border-top:1px solid var(--color-border);margin-top:30px}
.accordion-item{border-bottom:1px solid var(--color-border)}
.accordion-header{padding:18px 0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:13px;letter-spacing:1px;text-transform:uppercase;font-weight:500}
.accordion-content{padding:0 0 18px;font-size:14px;color:var(--color-text-light);line-height:1.8;display:none}
.accordion-item.open .accordion-content{display:block}
.accordion-item.open .accordion-icon{transform:rotate(45deg)}
.accordion-icon{font-size:18px;transition:transform .3s}

/* You May Also Like */
.related-section{padding:60px 0 80px;border-top:1px solid var(--color-border)}
.related-section h2{font-family:var(--font-serif);font-size:28px;font-weight:400;text-align:center;margin-bottom:40px;letter-spacing:2px}
.related-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;padding:0 40px}
.related-card{cursor:pointer;transition:transform .3s}
.related-card:hover{transform:translateY(-4px)}
.related-card-img{aspect-ratio:3/4;background:#f5f5f5;overflow:hidden;margin-bottom:12px}
.related-card-img img{width:100%;height:100%;object-fit:cover}
.related-card-name{font-size:13px;margin-bottom:6px}
.related-card-price{font-size:14px;font-weight:500}

/* Cart Drawer */
.cart-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9999;opacity:0;visibility:hidden;transition:all .3s}
.cart-overlay.open{opacity:1;visibility:visible}
.cart-drawer{position:fixed;top:0;right:-480px;width:460px;max-width:100%;height:100%;background:#fff;z-index:10000;transition:right .4s;display:flex;flex-direction:column}
.cart-drawer.open{right:0}
.cart-drawer-header{padding:24px 30px;border-bottom:1px solid var(--color-border);display:flex;justify-content:space-between;align-items:center}
.cart-drawer-header h3{font-family:var(--font-serif);font-size:22px;font-weight:400;letter-spacing:2px}
.cart-drawer-close{font-size:24px;cursor:pointer}
.cart-drawer-body{flex:1;overflow-y:auto;padding:20px 30px}
.cart-item{display:grid;grid-template-columns:80px 1fr;gap:16px;padding:16px 0;border-bottom:1px solid var(--color-border)}
.cart-item img{width:80px;height:100px;object-fit:cover}
.cart-item-info h4{font-size:13px;font-weight:400;margin-bottom:6px}
.cart-item-info .ci-price{font-size:14px;font-weight:500}
.cart-item-qty{display:flex;align-items:center;gap:8px;margin-top:8px}
.cart-item-qty button{width:28px;height:28px;border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center}
.cart-item-remove{font-size:11px;color:var(--color-text-light);text-decoration:underline;margin-top:8px;cursor:pointer}
.cart-drawer-footer{padding:24px 30px;border-top:1px solid var(--color-border)}
.cart-checkout-btn{width:100%;padding:16px;background:var(--color-text);color:#fff;font-size:13px;letter-spacing:2px;text-transform:uppercase;border:none;margin-bottom:10px}
.cart-continue{display:block;text-align:center;font-size:12px;color:var(--color-text-light);text-decoration:underline;cursor:pointer}

.footer{background:var(--color-text);color:#fff;padding:60px 0 30px}
.footer-bottom{border-top:1px solid rgba(255,255,255,.15);padding-top:20px;text-align:center}
.footer-bottom p{font-size:12px;color:rgba(255,255,255,.5)}

.added-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--color-text);color:#fff;padding:14px 28px;border-radius:4px;font-size:13px;letter-spacing:1px;z-index:9000;opacity:0;transition:opacity .3s;pointer-events:none}
.added-toast.show{opacity:1}

@media(max-width:1024px){.nav-main{display:none}.product-detail{grid-template-columns:1fr;gap:30px}.product-gallery{position:static}.related-grid{grid-template-columns:repeat(2,1fr);padding:0 20px}}
@media(max-width:768px){.product-detail{padding:10px 16px 60px}.related-grid{grid-template-columns:repeat(2,1fr);gap:12px}.header-inner{padding:14px 20px}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="announcement-bar">Summer Sale — Up to 50% off selected styles | <a href="collections.html?c=sale2">Shop now</a></div>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">STRAIT <span>PRISTINE</span></a>
    <nav class="nav-main">
      <a href="collections.html?c=dresses">Dresses</a>
      <a href="collections.html?c=kaftans">Kaftans</a>
      <a href="collections.html?c=kurtas">Kurtas</a>
      <a href="collections.html?c=beachwear">Beachwear</a>
      <a href="collections.html?c=bags">Bags</a>
      <a href="collections.html?c=home">Home</a>
      <a href="collections.html?c=new">New</a>
      <a href="collections.html?c=sale2" class="sale-link">Sale</a>
    </nav>
    <div class="nav-icons">
      <button onclick="openCart()">♡ <span class="cart-count" id="cartCount">0</span></button>
    </div>
  </div>
</header>

<div class="breadcrumb">
  <a href="index.html">Home</a> / <a href="collections.html?c=all">All Products</a> / <span id="breadcrumbName"></span>
</div>

<div class="product-detail" id="productDetail"></div>

<section class="related-section">
  <h2>You May Also Like</h2>
  <div class="related-grid" id="relatedGrid"></div>
</section>

<div class="added-toast" id="addedToast">Added to bag ✓</div>

<footer class="footer">
  <div class="container"><div class="footer-bottom"><p>© 2025 STRAIT PRISTINE RESOURCES PTE. LTD. All rights reserved.</p></div></div>
</footer>

<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-drawer-header"><h3>Shopping Bag</h3><span class="cart-drawer-close" onclick="closeCart()">✕</span></div>
  <div class="cart-drawer-body" id="cartBody"></div>
  <div class="cart-drawer-footer" id="cartFooter"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
const product = getProductById(productId);
let selectedSize = null;

if (!product) {
  document.getElementById('productDetail').innerHTML = '<p style="padding:60px;text-align:center">Product not found. <a href="collections.html">Back to shop</a></p>';
} else {
  document.title = product.name + ' | Strait Pristine';
  document.getElementById('breadcrumbName').textContent = product.name;
  selectedSize = product.sizes[0];

  const priceHTML = product.salePrice
    ? `<span class="current">S$${product.salePrice.toFixed(2)}</span> <span class="original">S$${product.price.toFixed(2)}</span> <span class="discount">-${product.discount}%</span>`
    : `S$${product.price.toFixed(2)}`;

  document.getElementById('productDetail').innerHTML = `
    <div class="product-gallery">
      <div class="gallery-main"><img src="${product.images[0]}" alt="${product.name}" id="mainImage"></div>
      <div class="gallery-thumbs">
        ${product.images.map((img,i) => `<img src="${img}" alt="" class="${i===0?'active':''}" onclick="switchImage('${img}',this)">`).join('')}
      </div>
    </div>
    <div class="product-info">
      <h1>${product.name}</h1>
      <div class="product-price-main">${priceHTML}</div>
      <p class="product-desc">${product.description}</p>
      <div class="size-label">Size</div>
      <div class="size-options" id="sizeOptions">
        ${product.sizes.map((s,i) => `<button class="${i===0?'selected':''}" onclick="selectSize('${s}',this)">${s}</button>`).join('')}
      </div>
      <button class="add-to-cart-btn" onclick="addToCart()">Add to Bag</button>
      <button class="buy-now-btn" onclick="buyNow()">Buy it now</button>
      <div class="product-meta">
        <span>SKU: SP-${String(product.id).padStart(4,'0')}</span>
        <span>Category: ${product.category.charAt(0).toUpperCase()+product.category.slice(1)}</span>
        <span>Free shipping on orders over S$200</span>
      </div>
      <div class="accordion">
        <div class="accordion-item open">
          <div class="accordion-header" onclick="toggleAccordion(this)">Details <span class="accordion-icon">+</span></div>
          <div class="accordion-content">
            <p>${product.description}</p>
            <p style="margin-top:12px">• Handcrafted with artisanal printing techniques<br>• Premium quality materials<br>• Designed in Singapore<br>• Dry clean recommended for silk items</p>
          </div>
        </div>
        <div class="accordion-item">
          <div class="accordion-header" onclick="toggleAccordion(this)">Shipping & Returns <span class="accordion-icon">+</span></div>
          <div class="accordion-content">
            <p>• Standard shipping (5-7 business days): S$12<br>• Express shipping (2-3 business days): S$25<br>• Free shipping on orders over S$200<br>• Returns accepted within 14 days of delivery<br>• Items must be unworn with tags attached<br>• <a href="shipping.html" style="text-decoration:underline">Full shipping policy</a> | <a href="returns.html" style="text-decoration:underline">Return policy</a></p>
          </div>
        </div>
        <div class="accordion-item">
          <div class="accordion-header" onclick="toggleAccordion(this)">Care Instructions <span class="accordion-icon">+</span></div>
          <div class="accordion-content">
            <p>• Silk items: Dry clean only<br>• Cotton items: Machine wash cold, gentle cycle<br>• Do not bleach<br>• Iron on low heat if needed<br>• Store in a cool, dry place</p>
          </div>
        </div>
      </div>
    </div>
  `;

  // Related products
  const related = products.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
  document.getElementById('relatedGrid').innerHTML = related.map(p => `
    <div class="related-card" onclick="location.href='product.html?id=${p.id}'">
      <div class="related-card-img"><img src="${p.images[0]}" alt="${p.name}" loading="lazy"></div>
      <div class="related-card-name">${p.name}</div>
      <div class="related-card-price">${p.salePrice ? `S$${p.salePrice.toFixed(2)}` : `S$${p.price.toFixed(2)}`}</div>
    </div>
  `).join('');
}

function switchImage(src, el) {
  document.getElementById('mainImage').src = src;
  document.querySelectorAll('.gallery-thumbs img').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
}

function selectSize(size, el) {
  selectedSize = size;
  document.querySelectorAll('.size-options button').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function addToCart() {
  if (!product) return;
  cart.addItem(product, selectedSize, 1);
  const toast = document.getElementById('addedToast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function buyNow() {
  addToCart();
  setTimeout(() => openCheckout(), 500);
}

function toggleAccordion(el) {
  el.parentElement.classList.toggle('open');
}

// Cart
function openCart(){document.getElementById('cartOverlay').classList.add('open');document.getElementById('cartDrawer').classList.add('open');renderCart()}
function closeCart(){document.getElementById('cartOverlay').classList.remove('open');document.getElementById('cartDrawer').classList.remove('open')}
function renderCart(){
  const b=document.getElementById('cartBody'),f=document.getElementById('cartFooter');
  if(cart.items.length===0){b.innerHTML='<div style="text-align:center;padding:60px 20px"><p style="color:#666;margin-bottom:20px">Your bag is empty</p></div>';f.innerHTML='';return}
  b.innerHTML=cart.items.map(i=>`<div class="cart-item"><img src="${i.image}" alt="${i.name}"><div class="cart-item-info"><h4>${i.name}</h4><div style="font-size:12px;color:#666">Size: ${i.size}</div><div class="ci-price">S$${(i.price*i.qty).toFixed(2)}</div><div class="cart-item-qty"><button onclick="cart.updateQty('${i.key}',${i.qty-1});renderCart()">−</button><span>${i.qty}</span><button onclick="cart.updateQty('${i.key}',${i.qty+1});renderCart()">+</button></div><span class="cart-item-remove" onclick="cart.removeItem('${i.key}');renderCart()">Remove</span></div></div>`).join('');
  const sub=cart.getSubtotal();
  f.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:16px;font-size:14px;font-weight:500"><span>Total</span><span>S$${sub.toFixed(2)}</span></div><button class="cart-checkout-btn" onclick="openCheckout()">Checkout</button><span class="cart-continue" onclick="closeCart()">Continue shopping</span>`;
}
cart.onChange(()=>{document.getElementById('cartCount').textContent=cart.getTotalItems();renderCart()});

function openCheckout(){
  closeCart();
  const m=document.createElement('div');m.id='checkoutModal';m.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:20000;display:flex;align-items:center;justify-content:center';
  const t=cart.getSubtotal();
  m.innerHTML=`<div style="background:#fff;border-radius:8px;width:480px;max-width:90%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)"><div style="padding:24px 30px;border-bottom:1px solid #e5e5e5;display:flex;justify-content:space-between;align-items:center"><h3 style="font-family:var(--font-serif);font-size:22px">Checkout</h3><span onclick="document.getElementById('checkoutModal').remove()" style="font-size:24px;cursor:pointer">✕</span></div><div style="padding:30px;text-align:center"><div style="margin-bottom:24px"><div style="font-size:14px;color:#666;margin-bottom:8px">Order Total</div><div style="font-size:32px;font-weight:500">S$${t.toFixed(2)}</div></div><div style="background:#f8f5f0;padding:16px;border-radius:6px;margin-bottom:24px"><div style="font-size:12px;color:#666;margin-bottom:4px">Merchant</div><div style="font-size:14px;font-weight:500;letter-spacing:1px">STRAIT PRISTINE RESOURCES PTE. LTD.</div></div><button onclick="processPayPal()" style="width:100%;padding:16px;background:#0070ba;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;margin-bottom:12px">Pay with PayPal</button><button onclick="processPayPal()" style="width:100%;padding:16px;background:#ffc439;color:#111;border:none;border-radius:6px;font-size:15px;cursor:pointer;margin-bottom:16px">Pay with Card</button><div style="font-size:11px;color:#999">Secured by PayPal</div></div></div>`;
  document.body.appendChild(m);
}
function processPayPal(){
  const m=document.getElementById('checkoutModal'),b=m.querySelector('button');
  b.innerHTML='Processing...';b.disabled=true;
  setTimeout(()=>{m.innerHTML=`<div style="background:#fff;border-radius:8px;width:480px;max-width:90%;padding:60px 40px;text-align:center"><div style="width:60px;height:60px;border-radius:50%;background:#22a85a;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff">✓</div><h3 style="font-family:var(--font-serif);font-size:28px;margin-bottom:12px">Thank You!</h3><p style="font-size:13px;color:#999;margin-bottom:32px">Merchant: STRAIT PRISTINE RESOURCES PTE. LTD.</p><button onclick="document.getElementById('checkoutModal').remove();cart.clear();location.href='index.html'" style="padding:14px 40px;background:#1a1a1a;color:#fff;border:none;font-size:13px;letter-spacing:2px;text-transform:uppercase;cursor:pointer">Continue Shopping</button></div>`},2500);
}
</script>
</body>
</html>
